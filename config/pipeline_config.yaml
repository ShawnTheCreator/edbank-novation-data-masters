# Pipeline Configuration
# Externalized configuration for data paths, schemas, and processing thresholds
# Design principle: Build for change - no hardcoded paths or values

# Input Data Paths
input:
  accounts:
    path: "/data/input/accounts.csv"
    format: "csv"
    options:
      header: "true"
      inferSchema: "false"
    source_system: "accounts_system"
  
  transactions:
    path: "/data/input/transactions.jsonl"
    format: "json"
    options:
      multiline: "false"
    source_system: "transactions_system"
  
  customers:
    path: "/data/input/customers.csv"
    format: "csv"
    options:
      header: "true"
      inferSchema: "false"
    source_system: "customers_system"

# Output Data Paths
output:
  bronze:
    base_path: "/data/output/bronze"
    format: "delta"
    mode: "overwrite"
  
  silver:
    base_path: "/data/output/silver"
    format: "delta"
    mode: "overwrite"
  
  gold:
    base_path: "/data/output/gold"
    format: "delta"
    mode: "overwrite"

# Spark Configuration
spark:
  app_name: "DataPipeline"
  # Constrained resources: 2 vCPUs, 2GB RAM
  executor_memory: "1g"
  driver_memory: "1g"
  executor_cores: 2
  # Critical optimization: reduce shuffle partitions for 2 cores
  # Default is 200 which causes memory fragmentation
  sql_shuffle_partitions: 4
  # Memory-safe lazy evaluation settings
  serializer: "org.apache.spark.serializer.KryoSerializer"
  kryo_registration_required: "false"

# Data Quality Thresholds
data_quality:
  # Null threshold - reject files with >50% nulls in critical columns
  max_null_percentage: 0.50
  # Deduplication settings
  deduplication:
    accounts_key: "account_id"
    customers_key: "customer_id"
    transactions_key: "transaction_id"

# Schema Definitions (for validation)
schemas:
  accounts:
    - name: "account_id"
      type: "string"
      nullable: false
    - name: "customer_id"
      type: "string"
      nullable: false
    - name: "account_type"
      type: "string"
      nullable: true
    - name: "balance"
      type: "decimal(18,2)"
      nullable: true
    - name: "created_date"
      type: "date"
      nullable: true
  
  customers:
    - name: "customer_id"
      type: "string"
      nullable: false
    - name: "first_name"
      type: "string"
      nullable: true
    - name: "last_name"
      type: "string"
      nullable: true
    - name: "email"
      type: "string"
      nullable: true
    - name: "phone"
      type: "string"
      nullable: true
    - name: "registration_date"
      type: "date"
      nullable: true
  
  transactions:
    - name: "transaction_id"
      type: "string"
      nullable: false
    - name: "account_id"
      type: "string"
      nullable: false
    - name: "transaction_date"
      type: "timestamp"
      nullable: false
    - name: "amount"
      type: "decimal(18,2)"
      nullable: false
    - name: "transaction_type"
      type: "string"
      nullable: true
    - name: "description"
      type: "string"
      nullable: true

# Gold Layer Configuration
gold_layer:
  # Partitioning strategy for fact table
  fact_partition_column: "transaction_date"
  # Broadcast hint threshold (tables smaller than this get broadcasted)
  broadcast_threshold_mb: 100
  # Table names
  tables:
    fact_transactions: "fact_transactions"
    dim_accounts: "dim_accounts"
    dim_customers: "dim_customers"
